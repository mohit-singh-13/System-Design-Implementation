services:
  mysql-master:
    image: mysql:8.0
    container_name: mysql-master
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: db_scaling_demo
    ports:
      - "3308:3306" # Exposed on host port 3307 to avoid conflicts
    volumes:
      - ./master/my.cnf:/etc/mysql/conf.d/my.cnf:ro
      - master-data:/var/lib/mysql
    networks:
      - mysql-scaling-net
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-ppassword" ]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql-replica:
    image: mysql:8.0
    container_name: mysql-replica
    environment:
      MYSQL_ROOT_PASSWORD: password
    ports:
      - "3309:3306" # Exposed on host port 3308
    volumes:
      - ./replica/my.cnf:/etc/mysql/conf.d/my.cnf:ro
      - replica-data:/var/lib/mysql
    networks:
      - mysql-scaling-net
    depends_on:
      mysql-master:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-ppassword" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  master-data:
  replica-data:


networks:
  mysql-scaling-net:
    driver: bridge
